<!DOCTYPE html>
<html>
<head>
    <title>JSON Inspector</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            border: 5px dashed #ccc;
        }
        h1 { color: #888; }
    </style>
</head>
<body>
    <h1>Drop JSON File Here</h1>

    <script>
        // Use 'window.data' so it's easily accessible in the console
        window.data = null;

        document.body.addEventListener('dragover', (e) => e.preventDefault());

        document.body.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];

            if (file && file.type === "application/json") {
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        window.data = JSON.parse(event.target.result);
                        console.log("✅ Success! File loaded into 'window.data'");
                        console.dir(window.data);
                    } catch (err) {
                        console.error("❌ Error parsing JSON:", err);
                    }
                };
                reader.readAsText(file);
            } else {
                console.warn("⚠️ Please drop a valid .json file.");
            }
        });
    </script>
</body>
</html>
